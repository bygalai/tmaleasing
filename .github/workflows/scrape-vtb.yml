name: Scrape VTB Leasing

on:
  schedule:
    # Every 4.5 hours: 00:00, 04:30, 09:00, 13:30, 18:00, 22:30 UTC
    - cron: '0 0,9,18 * * *'
    - cron: '30 4,13,22 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Max catalogue pages to scrape (each page ≈ 25 cars)'
        required: false
        default: '5'

concurrency:
  group: vtb-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      VTB_MAX_PAGES: ${{ github.event.inputs.max_pages || '5' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Chrome dependencies (Puppeteer)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libnspr4 libatk-bridge2.0-0 libatk1.0-0 libx11-6 libpangocairo-1.0-0 \
            libx11-xcb1 libcups2 libxcomposite1 libxdamage1 libxfixes3 libpango-1.0-0 \
            libgbm1 libasound2t64 libatspi2.0-0 libdrm2 libxkbcommon0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Verify environment
        run: |
          echo "Node $(node -v), npm $(npm -v)"
          [ -n "$SUPABASE_URL" ] || { echo "::error::SUPABASE_URL secret is not set"; exit 1; }
          [ -n "$SUPABASE_KEY" ] || { echo "::error::SUPABASE_KEY secret is not set"; exit 1; }
          echo "Supabase credentials OK"

      - name: Run VTB scraper
        run: npm run scrape:vtb
