name: Scrape VTB Leasing

on:
  schedule:
    # Every 4.5 hours: 00:00, 04:30, 09:00, 13:30, 18:00, 22:30 UTC
    - cron: '0 0,9,18 * * *'
    - cron: '30 4,13,22 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Max catalogue pages to scrape'
        required: false
        default: '20'
      enrich_limit:
        description: 'Max detail pages to enrich'
        required: false
        default: '50'

concurrency:
  group: vtb-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      VTB_MAX_PAGES: ${{ github.event.inputs.max_pages || '20' }}
      VTB_ENRICH_LIMIT: ${{ github.event.inputs.enrich_limit || '50' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Run VTB scraper
        run: npm run scrape:vtb
