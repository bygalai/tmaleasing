name: Scrape Gazprom Autoleasing

on:
  workflow_dispatch:
    inputs:
      max_listings:
        description: 'Max объявлений на категорию (0 = без лимита)'
        required: false
        default: '0'
      pages:
        description: 'Точное число страниц каталога на категорию (0 = авто)'
        required: false
        default: '0'

concurrency:
  group: gazprom-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GAZPROMP_MAX_PER_SECTION: ${{ github.event.inputs.max_listings || '0' }}
      GAZPROMP_MAX_PAGES: ${{ github.event.inputs.pages || '0' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Chrome dependencies (Puppeteer)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libnspr4 libatk-bridge2.0-0 libatk1.0-0 libx11-6 libpangocairo-1.0-0 \
            libx11-xcb1 libcups2 libxcomposite1 libxdamage1 libxfixes3 libpango-1.0-0 \
            libgbm1 libasound2t64 libatspi2.0-0 libdrm2 libxkbcommon0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Verify environment
        run: |
          echo "Node $(node -v), npm $(npm -v)"
          [ -n "$SUPABASE_URL" ] || { echo "::error::SUPABASE_URL secret is not set"; exit 1; }
          [ -n "$SUPABASE_KEY" ] || { echo "::error::SUPABASE_KEY secret is not set"; exit 1; }
          echo "Supabase credentials OK"

      - name: Run Gazprom scraper
        run: npm run scrape:gazprom
